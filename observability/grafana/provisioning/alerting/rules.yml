apiVersion: 1

groups:
  - orgId: 1
    name: shieldstream-alerts
    folder: ShieldStream
    interval: 1m
    rules:
      - uid: shieldstream-p99-latency
        title: "Proxy p99 latency > 50ms"
        condition: C
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "ShieldStream proxy p99 latency has exceeded 50ms for 2 minutes"
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: histogram_quantile(0.99, sum(rate(shieldstream_proxy_latency_ms_bucket[1m])) by (le))
              intervalMs: 1000
              maxDataPoints: 43200
          # A is still a (single-series) range query result, not a scalar —
          # Grafana's threshold expression refuses to evaluate "time series
          # data" directly ("only reduced data can be alerted on"). B reduces
          # it to one number per evaluation before C thresholds it.
          - refId: B
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 0
              to: 0
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 0
              to: 0
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [50]
                  operator:
                    type: and
                  query:
                    params: ["B"]
                  reducer:
                    type: last
