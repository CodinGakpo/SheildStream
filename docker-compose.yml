services:
  redis:
    image: redis:7.4-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_USER: shieldstream
      POSTGRES_PASSWORD: localdev_only
      POSTGRES_DB: shieldstream
    # Host port 5433, not 5432: this dev machine already has an unrelated
    # project's Postgres bound to 5432. Containers still talk to each other
    # over the internal Compose network as `postgres:5432` — only the
    # host-side mapping (for e.g. a local, non-Compose psql/alembic run)
    # changes.
    ports: ["5433:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shieldstream"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Local trace backend — OTLP-native, so the gateway's exporter config never
  # changes between this and AWS X-Ray later (Week 10 decision).
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # UI
      - "4317:4317" # OTLP gRPC receiver

  # Trivial echo server standing in for a real downstream service (Week 3).
  httpbin:
    image: kennethreitz/httpbin
    ports: ["9000:80"]

  gateway:
    # network: host on the build (not the running container) works around this
    # machine's container-DNS breakage (container resolv.conf points at an
    # upstream DNS IP unreachable from the docker0 bridge — see DECISIONS.md);
    # building with the host's network namespace bypasses it without touching
    # the Docker daemon config or firewalld, which would disrupt unrelated
    # running containers from other projects.
    build:
      context: ./gateway
      network: host
    # Fixed 1:1 mapping. A range ("8000-8005:8000") was used transiently for
    # the Week 9 multi-replica fan-out verification (`--scale gateway=N`
    # needs N distinct host ports) — but Docker's range allocator turned out
    # to use a forward-only cursor, not "lowest free port": after that
    # scaling test, repeated `stop/rm/up` cycles kept climbing to 8001, 8002,
    # ... even though the OS-level socket for 8000 was confirmed free each
    # time. A fixed mapping sidesteps the allocator's range-cursor state
    # entirely. If horizontal scaling needs live-testing again, temporarily
    # widen this back to a range.
    ports: ["8000:8000"]
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://shieldstream_app:localdev_only@postgres:5432/shieldstream
      # Week 9 admin API only — shieldstream_worker has UPDATE on policies,
      # shieldstream_app (above) is deliberately SELECT-only under RLS.
      ADMIN_DATABASE_URL: postgresql+asyncpg://shieldstream_worker:localdev_only@postgres:5432/shieldstream
      LOG_LEVEL: debug
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      # :z (lowercase — shared), not :Z (exclusive): Week 9's --scale gateway=2
      # test showed a second replica bind-mounting the same host directory
      # with :Z fails to even import the app ("Could not import module
      # app.main") — :Z grants relabeled access to exactly one container at a
      # time, so a second concurrent reader gets shut out. :z relabels for
      # shared read access across any number of containers, which is exactly
      # what horizontally scaling this service needs; still relabeled (so no
      # Permission Denied under Fedora's default SELinux enforcement), just
      # not exclusively.
      - ./gateway/app:/app/app:z

  # Analytics consumer: separate process from the gateway by design — a
  # stalled DB write must never compete with live proxied requests for the
  # gateway's event loop. Connects as shieldstream_worker (BYPASSRLS, the
  # sole runtime writer to request_metrics — see DECISIONS.md, Phase 1).
  analytics-consumer:
    build:
      context: ./consumers
      network: host
    command: ["python", "-m", "analytics.worker"]
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://shieldstream_worker:localdev_only@postgres:5432/shieldstream
      # Stable across restarts of this service so the consumer reclaims its
      # own PEL instantly on restart (see worker.py). A real multi-replica
      # deploy would derive this per-replica (e.g. from the task/pod id).
      CONSUMER_NAME: analytics-1
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      # :z (shared), not :Z (exclusive) — this directory is concurrently
      # bind-mounted by alert-consumer too. Two :Z mounts of the same host
      # path race on SELinux relabeling; on a cold `docker compose up -d`
      # this manifested as alert-consumer failing to start with
      # "ModuleNotFoundError: No module named 'alerts'" (same bug class as
      # the gateway's Week 9 :Z→:z fix, see below).
      - ./consumers:/app:z

  # Alert consumer: the second independent reader of request_events, via its
  # own consumer group (alert-cg), structurally decoupled from analytics-cg.
  # No DATABASE_URL — this consumer never touches Postgres; it runs two
  # detection tiers in memory and publishes alerts to the dashboard:alerts
  # Redis Pub/Sub channel. Single replica by design: the statistical tier's
  # per-endpoint RPS baseline is only correct when one consumer sees the whole
  # stream (see consumers/alerts/rps_window.py).
  alert-consumer:
    build:
      context: ./consumers
      network: host
    command: ["python", "-m", "alerts.worker"]
    environment:
      REDIS_URL: redis://redis:6379/0
      CONSUMER_NAME: alert-1
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./consumers:/app:z

  # One-off tooling container for Alembic migrations / seed script — run via
  # `docker compose run --rm migrate alembic upgrade head` (see README).
  # Not part of the default `up`; a fresh Python 3.12 image matching the
  # gateway's own base image, since the host has no matching interpreter.
  migrate:
    build:
      context: ./db
      network: host
    environment:
      MIGRATION_DATABASE_URL: postgresql+asyncpg://shieldstream:localdev_only@postgres:5432/shieldstream
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db:/app:Z
    profiles: ["tools"]

volumes:
  pg_data:
